<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade de Preservação Flash</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e0e0e6;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Menu Lateral (Sidebar) */
        #sidebar {
            width: 280px;
            background-color: #16161a;
            padding: 20px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            border-right: 1px solid #24242b;
        }
        #sidebar h2 { 
            margin-top: 0; 
            font-size: 1.3rem; 
            text-align: center; 
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 8px;
        }
        .category-title {
            font-size: 0.85rem;
            color: #888893;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .game-btn {
            background-color: #24242b;
            color: #e0e0e6;
            border: 1px solid #2c2c35;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .game-btn:hover { 
            background-color: #ffcc00; 
            color: #0f0f12; 
            font-weight: bold;
            transform: translateX(3px);
        }
        
        /* Área Principal do Player */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle, #1a1a24 0%, #0f0f12 100%);
        }
        #controls {
            margin-bottom: 15px;
            display: none; /* Só aparece com jogo ativo */
        }
        #close-btn {
            background-color: #ff3344;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(255, 51, 68, 0.3);
            transition: 0.2s;
        }
        #close-btn:hover { 
            background-color: #e62030; 
            transform: scale(1.02);
        }
        
        /* Container do Ruffle */
        #player-container {
            width: 800px;
            height: 600px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #24242b;
        }
        #placeholder-text { 
            color: #575765; 
            font-style: italic; 
            text-align: center;
            font-size: 1.1rem;
        }
    </style>
    
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="sidebar">
        <h2>Flash Archive</h2>
        
        <div class="category-title">🎮 Jogos Clássicos</div>
        <button class="game-btn" onclick="playGame('flash/isaac.swf')">The Binding of Isaac</button>
        <button class="game-btn" onclick="playGame('flash/alienhominidflashver.swf')">Alien Hominid</button>
        <button class="game-btn" onclick="playGame('flash/slap_flap_go.swf')">Rayman: Slap, Flap & Go!</button>

        <div class="category-title">🔴 Universo Madness</div>
        <button class="game-btn" onclick="playGame('flash/madnessinteractive.swf')">Madness Interactive (Jogo)</button>
        <button class="game-btn" onclick="playGame('flash/madnessaccelerant.swf')">Madness Accelerant (Jogo)</button>
        <button class="game-btn" onclick="playGame('flash/madness1.swf')">Madness Combat 1</button>
        <button class="game-btn" onclick="playGame('flash/madness2.swf')">Madness Combat 2</button>
        <button class="game-btn" onclick="playGame('flash/madness3.swf')">Madness Combat 3</button>
        <button class="game-btn" onclick="playGame('flash/madness4.swf')">Madness Combat 4</button>
        <button class="game-btn" onclick="playGame('flash/madness5.swf')">Madness Combat 5</button>

        <div class="category-title">🎬 Animações & Trilhas</div>
        <button class="game-btn" onclick="playGame('flash/382576_rawestforest.swf')">Rawest Forest (SMRPG)</button>
        <button class="game-btn" onclick="playGame('flash/574257_waltzoftheforestFINAL.swf')">Waltz of the Forest</button>
    </div>

    <div id="main-content">
        <div id="controls">
            <button id="close-btn" onclick="closeGame()">❌ Fechar Conteúdo Atual</button>
        </div>
        
        <div id="player-container">
            <div id="placeholder-text">Selecione um jogo ou animação<br>no menu lateral para iniciar.</div>
        </div>
    </div>

    <script>
        // Inicializa o motor do Ruffle
        const ruffle = window.RufflePlayer.newest();
        const container = document.getElementById('player-container');
        const controls = document.getElementById('controls');
        let activePlayer = null;

        function playGame(swfUrl) {
            // Garante a destruição total do Flash anterior (limpa cache de áudio e tela)
            closeGame();

            // Instancia o novo player do Ruffle
            activePlayer = ruffle.createPlayer();
            container.innerHTML = ''; 
            container.appendChild(activePlayer);

            // Ajusta o comportamento de tela cheia dentro da div
            activePlayer.style.width = "100%";
            activePlayer.style.height = "100%";
            
            // Carrega o arquivo solicitado
            activePlayer.load({
                url: swfUrl,
                allowScriptAccess: false
            });

            // Exibe o botão de controle
            controls.style.display = 'block';
        }

        function closeGame() {
            if (activePlayer) {
                activePlayer.remove(); // Remove o elemento do DOM, matando processos e áudios instantaneamente
                activePlayer = null;
            }
            // Reseta para a tela inicial neutra
            container.innerHTML = '<div id="placeholder-text">Selecione um jogo ou animação<br>no menu lateral para iniciar.</div>';
            controls.style.display = 'none';
        }
    </script>
</body>
</html>
